<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TopRankVids — Create TikTok ranking videos in your browser. Choose a rank, add clips, customize the title, export to MP4.">
  <title>TopRankVids — TikTok Ranking Video Creator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
  <main class="landing-page">
    <div class="landing-card">
      <h1 class="landing-logo">TopRankVids</h1>
      <p class="landing-tagline">Create TikTok ranking videos in seconds</p>

      <p class="rank-label">How many items in your ranking?</p>
      <div class="rank-grid" id="rank-grid"></div>

      <button class="btn btn-primary btn-full" id="btn-start" disabled>
        ✨ Start Creating
      </button>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
